exec-once=touch /tmp/hyprstart.lock

exec-once=waybar

exec-once=sleep 1; swww init 

exec-once=swaync -c .config/swaync/config.json -s .config/swaync/style.css & 

exec-once=swww img /home/traveler/Imagens/$(wpg -c)

exec-once=./scripts/xdg-portal.sh
exec-once=nm-applet --indicator 
exec-once=calcurse-daemon
exec-once=syncthing-gtk --minimized

exec-once=wl-paste --type text --watch cliphist store
