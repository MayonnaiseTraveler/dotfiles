exec-once=obsidian
exec-once=[group] vencord-desktop --enable-features=WaylandWindowDecorations --ozone-platform-hint=auto --disable-gpu --no-sandbox
exec-once=[group] easyeffects
exec-once=[group] spotify
exec-once=[group] librewolf 
exec-once=[group] keepassxc 


exec-once=playerctld daemon 
exec-once=spotify 
exec-once=mpd 
exec-once=mpDris2 
