# Vivi's Hyprland config

source=~/.config/hypr/env.conf
source=~/.config/hypr/binds.conf
source=~/.config/hypr/rules.conf
source=~/.config/hypr/execs.conf

## Setup monitors
monitor=HDMI-A-1,1920x1080@60hz,0x0,1
monitor=HDMI-A-2,disabled

input {
    kb_file=
    kb_layout= br
    kb_variant=
    kb_model=
    kb_options=
    kb_rules=
    repeat_delay=300
    repeat_rate=50
	numlock_by_default = true

    follow_mouse=1

    touchpad {
		tap-and-drag = true
        natural_scroll= true
		tap-to-click = true

    }

    sensitivity=0 # -1.0 - 1.0, 0 means no modification.
}


general {
    gaps_in=5
    gaps_out=20
    border_size=1
    col.active_border= rgb(ffff73) rgb(246afd) 
    col.inactive_border=rgb(142f55)
    
    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)

}

decoration {

	blur {
		enabled= false
		size=4 # minimum 1
		passes=1 # minimum 1
		new_optimizations=1

	}

    rounding=7
    drop_shadow=true
    shadow_range=10
    col.shadow=rgb(c8d569)
    col.shadow_inactive = rgb(0b192d)
}


animations {

    enabled=1
    bezier=overshoot,0.05,0.9,0.1,1.1
    # animation=fadeIn,1,3,default
    # animation=fadeOut,1,3,default

    # animation=windowsIn,1,6,overshoot,slide
    # animation=windowsOut,1,6,overshoot,slide
    animation=windowsMove,1,6,overshoot

    animation=border,1,5,overshoot
    animation=borderangle,1,5,default
    animation=workspaces,1,6,overshoot,slidevert
}

dwindle {
    preserve_split=true
    pseudotile=1 # enable pseudotiling on dwindle
}

gestures {
    workspace_swipe=true
}

group {
	col.border_inactive= rgba(0b192d00)
    col.border_active= rgb(246afd) rgb(ffff73) 

		groupbar {
			col.inactive=rgba(0b192d00)
			col.active= rgb(246afd) rgb(ffff73) 
			font_size = 10
			text_color = rgb(ffffe6)
			gradients = true 
		}
	}

misc {

	hide_cursor_on_touch = false
	disable_hyprland_logo = true
	disable_autoreload = false 
	disable_splash_rendering = true
	mouse_move_enables_dpms = false
	key_press_enables_dpms = true
	vfr = true 
	vrr = false
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	enable_swallow = true
    swallow_regex = .*
}


