# Vivi's Hyprland config

source=~/.config/hypr/env.conf
source=~/.config/hypr/binds.conf
source=~/.config/hypr/rules.conf
source=~/.config/hypr/execs.conf

## Setup monitors
monitor=HDMI-A-1,1920x1080@60hz,0x0,1
monitor=HDMI-A-2,disabled

##
input {
    
   	# kb_model=
    # kb_variant=
    # kb_rules=
    # kb_file=
    kb_options=caps:swapescape 
    kb_layout=br
	numlock_by_default = true
    follow_mouse=1
    repeat_delay=300
    repeat_rate=50

    touchpad {
		tap-and-drag = true
        natural_scroll= true
		tap-to-click = true
    }

    sensitivity=0 # -1.0 - 1.0, 0 means no modification.

}


general {
    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)

}

animations {
    enabled=1
    # bezier=overshoot,0.13,0.99,0.29,1.1
	bezier=overshoot,0.05,0.9,0.1,1.1
	# bezier=overshoot,0,0,-0.8,-0.8,
    animation=fadeIn,1,3,default
    animation=fadeOut,1,3,default
    animation=windowsIn,1,6,overshoot,popin
    animation=windowsOut,1,6,overshoot,popin
    animation=windowsMove,1,5,overshoot

    animation=border,1,4,overshoot
    animation=borderangle,1,4,default
    animation=workspaces,1,5,overshoot,slidevert
	first_launch_animation= true
}

dwindle {
    preserve_split=true
    pseudotile=1 # enable pseudotiling on dwindle
}

gestures {
    workspace_swipe=true
}

misc {
	hide_cursor_on_touch = false
	disable_hyprland_logo = true
	disable_autoreload = false 
	disable_splash_rendering = true
	mouse_move_enables_dpms = false
	key_press_enables_dpms = true
	vfr = true 
	vrr = false
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	enable_swallow = true
    swallow_regex = .*
}

source=~/.config/hypr/style.conf
