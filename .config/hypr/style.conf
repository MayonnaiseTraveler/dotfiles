# Dynamic Hyprland Style settings, modified by wpgtk

general {

    gaps_in=4
    gaps_out=16,16,16,16
    border_size=1
    col.active_border= rgb(018688)
    col.inactive_border=rgb(112641)

}

decoration {

	blur {
		enabled= false
		size=4 # minimum 1
		passes=1 # minimum 1
		new_optimizations=1
	}

    rounding=10
    drop_shadow=true
	shadow_offset=4 4
    shadow_range=0
    col.shadow=rgb(018688)
	shadow_render_power=1
    col.shadow_inactive = rgb(112641)

}

group {
	
	col.border_inactive= rgba(070f1900)
    col.border_active= rgb(01aba2) rgb(018688) 
		groupbar {
			col.inactive=rgba(070f1900)
			col.active= rgb(01aba2) rgb(018688) 
			font_size = 12
			font_family=ShureTechMono Nerd Font Mono Bold
			text_color = rgb(92ffff)
			gradients =false 
			render_titles= true
		}
	}
plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(070f19)
		col.text = rgb(018688)
		bar_text_font=ShureTechMono Nerd Font Mono
		bar_part_of_window = true
		bar_button_padding=12
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(018688),14,, hyprctl dispatch killactive
        hyprbars-button = rgb(018688),14,󰊓, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(018688),14,󰐃, hyprctl dispatch pin
	}
	# hyprexpo {
	# 		columns = 3
	# 		gap_size = 4
	# 		bg_col = rgb(#070f19.strip)
