# Dynamic Hyprland Style settings, modified by wpgtk

general {

    gaps_in=5
    gaps_out=20
    border_size=1
    col.active_border= rgb(c92081) rgb(ec4599) 
    col.inactive_border=rgb(2e1325)

}

decoration {

	blur {
		enabled= false
		size=4 # minimum 1
		passes=1 # minimum 1
		new_optimizations=1
	}

    rounding=7
    drop_shadow=true
    shadow_range=10
    col.shadow=rgb(922262)
    col.shadow_inactive = rgb(0b0509)

}

group {
	
	col.border_inactive= rgba(0b050900)
    col.border_active= rgb(ec4599) rgb(c92081) 
		groupbar {
			col.inactive=rgba(0b050900)
			col.active= rgb(ec4599) rgb(c92081) 
			font_size = 12
			text_color = rgb(ffffff)
			gradients = true 
			render_titles= true
		}

	}
plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(0b0509)
		col.text = rgb(c92081)
		bar_text_font=ShureTechMono Nerd Font Mono
		bar_part_of_window = true
		bar_button_padding=12
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(c92081),14,, hyprctl dispatch killactive
        hyprbars-button = rgb(c92081),14,󰊓, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(c92081),14,󰐃, hyprctl dispatch pin



    }
}
