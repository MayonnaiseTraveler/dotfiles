# Dynamic Hyprland Style settings, modified by wpgtk

general {

    gaps_in=5
    gaps_out=16
    border_size=2
    col.active_border= rgb(ffff73) rgb(64cad3) 
    col.inactive_border=rgb(142f55)

}

decoration {

	blur {
		enabled= false
		size=4 # minimum 1
		passes=1 # minimum 1
		new_optimizations=1
	}

    rounding=10
    drop_shadow=false
    shadow_range=4
    col.shadow=rgb(c8d569)
    col.shadow_inactive = rgb(0b192d)

}

group {
	
	col.border_inactive= rgba(0b192d00)
    col.border_active= rgb(64cad3) rgb(ffff73) 
		groupbar {
			col.inactive=rgba(0b192d00)
			col.active= rgb(64cad3) rgb(ffff73) 
			font_size = 12
			text_color = rgb(ffffe6)
			gradients =false 
			render_titles= true
		}

	}
plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(0b192d)
		col.text = rgb(ffff73)
		bar_text_font=ShureTechMono Nerd Font Mono
		bar_part_of_window = true
		bar_button_padding=12
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(ffff73),14,, hyprctl dispatch killactive
        hyprbars-button = rgb(ffff73),14,󰊓, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(ffff73),14,󰐃, hyprctl dispatch pin



    }
}
