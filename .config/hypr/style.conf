# Dynamic Hyprland Style settings, modified by wpgtk

general {

    gaps_in=4
    gaps_out=16,16,16,16
    border_size=1
    col.active_border= rgb(01e0ff)
    col.inactive_border=rgb(1d272b)

}

decoration {

	blur {
		enabled= false
		size=4 # minimum 1
		passes=1 # minimum 1
		new_optimizations=1
	}

    rounding=10
    drop_shadow=true
	shadow_offset=4 4
    shadow_range=0
    col.shadow=rgb(01e0ff)
	shadow_render_power=1
    col.shadow_inactive = rgb(1d272b)

}

group {
	
	col.border_inactive= rgba(090C0D00)
    col.border_active= rgb(01b2a0) rgb(01e0ff) 
		groupbar {
			col.inactive=rgba(090C0D00)
			col.active= rgb(01b2a0) rgb(01e0ff) 
			font_size = 12
			font_family=ShureTechMono Nerd Font Mono Bold
			text_color = rgb(9fffff)
			gradients =false 
			render_titles= true
		}

	}
plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(090C0D)
		col.text = rgb(01e0ff)
		bar_text_font=ShureTechMono Nerd Font Mono
		bar_part_of_window = true
		bar_button_padding=12
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(01e0ff),14,, hyprctl dispatch killactive
        hyprbars-button = rgb(01e0ff),14,󰊓, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(01e0ff),14,󰐃, hyprctl dispatch pin



    }
}
