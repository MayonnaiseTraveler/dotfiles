# Dynamic Hyprland Style settings, modified by wpgtk

general {

    gaps_in=5
    gaps_out=4
    border_size=2
    col.active_border= rgb(01b2a0) rgb(0190c4) 
    col.inactive_border=rgb(1d272b)

}

decoration {

	blur {
		enabled= false
		size=4 # minimum 1
		passes=1 # minimum 1
		new_optimizations=1
	}

    rounding=10
    drop_shadow=true
    shadow_range=4
    col.shadow=rgb(03877A)
    col.shadow_inactive = rgb(090C0D)

}

group {
	
	col.border_inactive= rgba(090C0D00)
    col.border_active= rgb(0190c4) rgb(01b2a0) 
		groupbar {
			col.inactive=rgba(090C0D00)
			col.active= rgb(0190c4) rgb(01b2a0) 
			font_size = 12
			text_color = rgb(9fffff)
			gradients = true 
			render_titles= true
		}

	}
plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(090C0D)
		col.text = rgb(01b2a0)
		bar_text_font=ShureTechMono Nerd Font Mono
		bar_part_of_window = true
		bar_button_padding=12
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(01b2a0),14,, hyprctl dispatch killactive
        hyprbars-button = rgb(01b2a0),14,󰊓, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(01b2a0),14,󰐃, hyprctl dispatch pin



    }
}
